<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Ecommerce using JS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <h2>My Shop</h2>
        <div>
            <a href="#home">Home</a>
            <a href="#cart">Cart</a>
        </div>
    </nav>
      
    <div class="search-bar" id="search-section">
        <input type="text" id="search" placeholder="Search products...">
    </div>
      
    <main>
        <section id="home-page" class="page">
            <div id="product-list" class="products"></div>
        </section>
      
        <section id="cart-page" class="page hidden">
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <h3>Total: ₹<span id="total">0</span></h3>
        </section>
    </main>
    <script type="module" src="src.js"></script>
</body>
</html>
